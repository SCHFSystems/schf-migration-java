name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y git gitleaks
      - run: git diff --check HEAD~1
      - run: gitleaks detect --no-git --source .
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Run mvn verify (unit + Testcontainers integration)
        run: mvn verify -B
      - name: Build JAR
        run: mvn package -B -DskipTests
      - name: Test CLI --help
        run: java -jar target/schf-migration-java.jar 2>&1 | head -5
  graphify-boundary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: "echo 'Graphify boundary: schf-core-java must not know Firebird, SGH, or legacy credentials'"
